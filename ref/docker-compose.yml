version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql80
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: my123456
      MYSQL_DATABASE: mydb
      MYSQL_USER: myuser
      MYSQL_PASSWORD: my123456
    volumes:
      - mysql80_data:/var/lib/mysql

volumes:
  mysql80_data: